<script>
// 게임 설정
const getMaxRounds = () => {
  return window.innerWidth < 768 ? 6 : 10; // 모바일은 6라운드, 데스크톱은 10라운드
};

// 게임 상태
let currentRound = 1;
let maxRounds = getMaxRounds();
let userTotalScore = 0;
let computerTotalScore = 0;
let userRoundScores = [];
let computerRoundScores = [];
let userExpression = [];
let userCards = [];
let computerCards = [];
let roundCompleted = false;
let usedCardIndices = [];
let gameEnded = false;

// 카드덱 생성 (MAXI용 - 큰 수 만들기)
const createUserNumberDeck = () => {
  const deck = [];
  for (let num = 1; num <= 10; num++) {
    for (let i = 0; i < 2; i++) deck.push(num);
  }
  for (let num = 11; num <= 20; num++) {
    deck.push(num);
  }
  return deck;
};

const createComputerNumberDeck = () => {
  const deck = [];
  for (let num = 1; num <= 10; num++) {
    for (let i = 0; i < 2; i++) deck.push(num);
  }
  for (let num = 11; num <= 19; num++) {
    deck.push(num);
  }
  deck.push(1); // 20 대신 1 추가
  return deck;
};

const createOperatorDeck = () => {
  const deck = [];
  // 더하기, 빼기, 곱하기 각각 약 7개씩
  for (let i = 0; i < 7; i++) deck.push('+');
  for (let i = 0; i < 7; i++) deck.push('-');
  for (let i = 0; i < 6; i++) deck.push('×');
  return deck;
};

const shuffleAndDraw = (deck, count) => {
  const shuffled = [...deck].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, count);
};

const generateUserCards = () => {
  const numbers = shuffleAndDraw(createUserNumberDeck(), 3);
  const operators = shuffleAndDraw(createOperatorDeck(), 2);
  return [...numbers, ...operators];
};

const generateComputerCards = () => {
  const numbers = shuffleAndDraw(createComputerNumberDeck(), 3);
  const operators = shuffleAndDraw(createOperatorDeck(), 2);
  return [...numbers, ...operators];
};

// 점수판 초기화
const resetScoreboard = () => {
  for (let i = 1; i <= 10; i++) {
    const userCell = document.getElementById(`userR${i}`);
    const compCell = document.getElementById(`compR${i}`);
    if (userCell) {
      userCell.textContent = '-';
      userCell.classList.remove('current-round');
    }
    if (compCell) {
      compCell.textContent = '-';
      compCell.classList.remove('current-round');
    }
  }
  document.getElementById('userTotal').textContent = '0';
  document.getElementById('compTotal').textContent = '0';
  document.getElementById('roundDisplay').textContent = '1';
};

// 카드 렌더링
const renderCards = () => {
  const cardsArea = document.getElementById('cardsArea');
  cardsArea.innerHTML = '';
  
  userCards.forEach((card, index) => {
    const btn = document.createElement('button');
    btn.className = `${!isNaN(card) ? 'number-card' : 'operator-card'} ${usedCardIndices.includes(index) ? 'used' : ''}`;
    btn.textContent = card;
    btn.onclick = () => {
      if (!roundCompleted && !usedCardIndices.includes(index)) {
        userExpression.push(card);
        usedCardIndices.push(index);
        updateUserExpression();
        renderCards();
        
        // 모든 카드 사용 시 자동 제출 버튼 활성화
        if (usedCardIndices.length === 5) {
          document.querySelector('#actionButtons button').style.background = 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)';
        }
      }
    };
    cardsArea.appendChild(btn);
  });
};

const renderComputerCards = () => {
  const area = document.getElementById('computerCardsArea');
  area.innerHTML = '';
  computerCards.forEach(card => {
    const span = document.createElement('span');
    span.className = !isNaN(card) ? 'number-card' : 'operator-card';
    span.style.cursor = 'default';
    span.textContent = card;
    area.appendChild(span);
  });
};

const updateUserExpression = () => {
  const display = document.getElementById('userExpression');
  if (userExpression.length === 0) {
    display.textContent = '(모든 카드를 클릭해서 수식을 만드세요.)';
  } else {
    display.textContent = userExpression.join(' ');
  }
};

// 컴퓨터 최적해 (최대값 찾기 - 모든 카드 사용)
const findBestExpression = (cards) => {
  const numbers = cards.filter(c => !isNaN(c));
  const operators = cards.filter(c => isNaN(c));
  
  let bestExpr = '';
  let bestValue = -Infinity;

  // 모든 가능한 배치 시도 (숫자 3개, 연산자 2개 모두 사용)
  // 패턴: num op num op num
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 3; j++) {
      for (let k = 0; k < 3; k++) {
        if (i !== j && j !== k && i !== k) {
          for (let x = 0; x < 2; x++) {
            for (let y = 0; y < 2; y++) {
              if (x !== y) {
                try {
                  const expr = `${numbers[i]} ${operators[x]} ${numbers[j]} ${operators[y]} ${numbers[k]}`;
                  // ×를 *로 변환하여 계산
                  const calcExpr = expr.replace(/×/g, '*');
                  const val = eval(calcExpr);
                  if (val > bestValue) {
                    bestValue = val;
                    bestExpr = expr;
                  }
                } catch {}
              }
            }
          }
        }
      }
    }
  }

  return { expr: bestExpr, value: bestValue };
};

// 점수판 업데이트
const updateScoreboard = () => {
  // 하이라이트 제거
  for (let i = 1; i <= 10; i++) {
    const userCell = document.getElementById(`userR${i}`);
    const compCell = document.getElementById(`compR${i}`);
    if (userCell) userCell.classList.remove('current-round');
    if (compCell) compCell.classList.remove('current-round');
  }

  // 점수 업데이트
  for (let i = 0; i < userRoundScores.length; i++) {
    const userCell = document.getElementById(`userR${i + 1}`);
    if (userCell) userCell.textContent = userRoundScores[i];
  }
  for (let i = 0; i < computerRoundScores.length; i++) {
    const compCell = document.getElementById(`compR${i + 1}`);
    if (compCell) compCell.textContent = computerRoundScores[i];
  }
  
  document.getElementById('userTotal').textContent = userTotalScore;
  document.getElementById('compTotal').textContent = computerTotalScore;

  // 현재 라운드 하이라이트
  if (currentRound <= maxRounds) {
    const userCell = document.getElementById(`userR${currentRound}`);
    const compCell = document.getElementById(`compR${currentRound}`);
    if (userCell) userCell.classList.add('current-round');
    if (compCell) compCell.classList.add('current-round');
  }
};

// 게임 시작
const startGame = () => {
  maxRounds = getMaxRounds();
  currentRound = 1;
  userTotalScore = 0;
  computerTotalScore = 0;
  userRoundScores = [];
  computerRoundScores = [];
  userExpression = [];
  roundCompleted = false;
  usedCardIndices = [];
  gameEnded = false;

  // 반응형 라운드 수 표시 업데이트
  document.getElementById('maxRoundsDisplay').textContent = maxRounds;
  document.getElementById('maxRoundsInTitle').textContent = maxRounds;

  resetScoreboard();
  userCards = generateUserCards();
  computerCards = generateComputerCards();
  
  updateScoreboard();
  renderCards();
  renderComputerCards();
  updateUserExpression();
  
  document.getElementById('computerExpression').textContent = '컴퓨터가 생각 중...';
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('nextRoundArea').classList.add('hidden');
  document.getElementById('actionButtons').classList.remove('hidden');
};

const restartGame = () => startGame();

// 수식 제출
const submitExpression = () => {
  if (gameEnded || roundCompleted) return;
  
  if (usedCardIndices.length !== 5) {
    return alert('모든 카드(5장)를 사용해야 합니다!');
  }
  
  try {
    const exprString = userExpression.join(' ');
    // ×를 *로 변환하여 계산
    const calcExpr = exprString.replace(/×/g, '*');
    const userVal = eval(calcExpr);
    
    // 사용자 결과를 수식에 추가
    document.getElementById('userExpression').textContent = `${exprString} = ${userVal}`;
    
    const { expr: computerExpr, value: computerVal } = findBestExpression(computerCards);
    document.getElementById('computerExpression').textContent = `${computerExpr} = ${computerVal}`;

    userRoundScores.push(userVal);
    computerRoundScores.push(computerVal);
    userTotalScore += userVal;
    computerTotalScore += computerVal;
    
    updateScoreboard();
    roundCompleted = true;
    document.getElementById('actionButtons').classList.add('hidden');

    if (currentRound >= maxRounds) {
      setTimeout(() => {
        gameEnded = true;
        let resultText = '';
        
        if (userTotalScore > computerTotalScore) {
          resultText = `🏆 축하합니다! 승리하셨습니다!<br>최종 점수: ${userTotalScore} vs ${computerTotalScore}`;
        } else if (computerTotalScore > userTotalScore) {
          resultText = `😔 아쉽게도 패배하셨습니다.<br>최종 점수: ${userTotalScore} vs ${computerTotalScore}`;
        } else {
          resultText = `🤝 무승부입니다!<br>최종 점수: ${userTotalScore} vs ${computerTotalScore}`;
        }
        
        document.getElementById('finalResult').innerHTML = resultText;
        document.getElementById('resultArea').classList.remove('hidden');
      }, 2000);
    } else {
      document.getElementById('nextRoundArea').classList.remove('hidden');
    }
    
  } catch (error) {
    alert('올바른 수식을 입력해주세요!');
  }
};

// 다음 라운드
const nextRound = () => {
  if (gameEnded) return;
  
  currentRound++;
  document.getElementById('roundDisplay').textContent = currentRound;

  userCards = generateUserCards();
  computerCards = generateComputerCards();
  userExpression = [];
  usedCardIndices = [];
  roundCompleted = false;

  renderCards();
  renderComputerCards();
  updateUserExpression();
  document.getElementById('computerExpression').textContent = '컴퓨터가 생각 중...';
  
  updateScoreboard();
  document.getElementById('nextRoundArea').classList.add('hidden');
  document.getElementById('actionButtons').classList.remove('hidden');
  
  // 제출 버튼 색상 초기화
  document.querySelector('#actionButtons button').style.background = '';
};

// 수식 초기화
const resetExpression = () => {
  if (!roundCompleted) {
    userExpression = [];
    usedCardIndices = [];
    renderCards();
    updateUserExpression();
    
    // 제출 버튼 색상 초기화
    document.querySelector('#actionButtons button').style.background = '';
  }
};

// 리사이즈 이벤트 리스너 (반응형 대응)
window.addEventListener('resize', () => {
  const newMaxRounds = getMaxRounds();
  if (newMaxRounds !== maxRounds && !gameEnded) {
    maxRounds = newMaxRounds;
    document.getElementById('maxRoundsDisplay').textContent = maxRounds;
    document.getElementById('maxRoundsInTitle').textContent = maxRounds;
    
    // 현재 라운드가 새로운 최대 라운드를 초과하면 게임 종료
    if (currentRound > maxRounds && roundCompleted) {
      setTimeout(() => {
        gameEnded = true;
        let resultText = '';
        
        if (userTotalScore > computerTotalScore) {
          resultText = `🏆 축하합니다! 승리하셨습니다!<br>최종 점수: ${userTotalScore} vs ${computerTotalScore}`;
        } else if (computerTotalScore > userTotalScore) {
          resultText = `😔 아쉽게도 패배하셨습니다.<br>최종 점수: ${userTotalScore} vs ${computerTotalScore}`;
        } else {
          resultText = `🤝 무승부입니다!<br>최종 점수: ${userTotalScore} vs ${computerTotalScore}`;
        }
        
        document.getElementById('finalResult').innerHTML = resultText;
        document.getElementById('resultArea').classList.remove('hidden');
        document.getElementById('nextRoundArea').classList.add('hidden');
      }, 1000);
    }
  }
});

// 게임 시작
window.onload = () => startGame();
</script>
