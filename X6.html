<script>
// 게임 설정
const getMaxRounds = () => {
  return window.innerWidth < 768 ? 6 : 10; // 모바일은 6라운드, 데스크톱은 10라운드
};

// 게임 상태
let currentRound = 1;
let maxRounds = getMaxRounds();
let userTotalScore = 0;
let computerTotalScore = 0;
let userRoundScores = [];
let computerRoundScores = [];
let userExpression = [];
let userCards = [];
let computerCards = [];
let roundCompleted = false;
let usedCardIndices = [];
let gameEnded = false;

// 수식 안전 계산 함수 (eval 대신 사용)
const safeCalculate = (expression) => {
  try {
    // ×를 *, ÷를 /로 변환
    const calcExpr = expression.replace(/×/g, '*').replace(/÷/g, '/');
    
    // 간단한 수식 파싱 및 계산
    const tokens = calcExpr.split(' ');
    let result = parseFloat(tokens[0]);
    
    for (let i = 1; i < tokens.length; i += 2) {
      const operator = tokens[i];
      const operand = parseFloat(tokens[i + 1]);
      
      if (isNaN(operand)) {
        throw new Error('Invalid operand');
      }
      
      switch (operator) {
        case '+':
          result += operand;
          break;
        case '-':
          result -= operand;
          break;
        case '*':
          result *= operand;
          break;
        case '/':
          if (operand === 0) {
            throw new Error('Division by zero');
          }
          result /= operand;
          break;
        default:
          throw new Error('Invalid operator');
      }
    }
    
    return result;
  } catch (error) {
    console.error('Calculation error:', error);
    return NaN;
  }
};

// 카드덱 생성 (MINI용 - 작은 수 만들기, 카드덱 반대)
const createUserNumberDeck = () => {
  const deck = [];
  for (let num = 1; num <= 10; num++) {
    for (let i = 0; i < 2; i++) deck.push(num);
  }
  for (let num = 11; num <= 19; num++) {
    deck.push(num);
  }
  deck.push(1); // 20 대신 1 추가 (작은 수에 유리)
  return deck;
};

const createComputerNumberDeck = () => {
  const deck = [];
  for (let num = 1; num <= 10; num++) {
    for (let i = 0; i < 2; i++) deck.push(num);
  }
  for (let num = 11; num <= 20; num++) {
    deck.push(num);
  }
  return deck;
};

const createOperatorDeck = () => {
  const deck = [];
  // 더하기, 빼기, 곱하기, 나누기 각각 5개씩
  for (let i = 0; i < 5; i++) deck.push('+');
  for (let i = 0; i < 5; i++) deck.push('-');
  for (let i = 0; i < 5; i++) deck.push('×');
  for (let i = 0; i < 5; i++) deck.push('÷');
  return deck;
};

const shuffleAndDraw = (deck, count) => {
  const shuffled = [...deck].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, count);
};

const generateUserCards = () => {
  const numbers = shuffleAndDraw(createUserNumberDeck(), 3);
  const operators = shuffleAndDraw(createOperatorDeck(), 2);
  return [...numbers, ...operators];
};

const generateComputerCards = () => {
  const numbers = shuffleAndDraw(createComputerNumberDeck(), 3);
  const operators = shuffleAndDraw(createOperatorDeck(), 2);
  return [...numbers, ...operators];
};

// 결과 처리 (소수점 반올림, 음수 허용)
const processResult = (value) => {
  return Math.round(value); // 음수 허용, 소수점만 반올림
};

// 반응형 점수판 설정
const setupScoreboard = () => {
  maxRounds = getMaxRounds();
  document.getElementById('maxRoundsDisplay').textContent = maxRounds;
  document.getElementById('maxRoundsInScoreboard').textContent = maxRounds;
  
  // 모바일에서는 7-10 라운드 컬럼 숨기기
  if (maxRounds === 6) {
    for (let i = 7; i <= 10; i++) {
      // 헤더 숨기기
      const headerCells = document.querySelectorAll(`#scoreboardHeader th:nth-child(${i + 1})`);
      headerCells.forEach(cell => cell.style.display = 'none');
      
      // 데이터 셀 숨기기
      const dataCells = document.querySelectorAll(`#userR${i}, #compR${i}`);
      dataCells.forEach(cell => cell.style.display = 'none');
    }
  } else {
    // 데스크톱에서는 모든 컬럼 표시
    for (let i = 7; i <= 10; i++) {
      const headerCells = document.querySelectorAll(`#scoreboardHeader th:nth-child(${i + 1})`);
      headerCells.forEach(cell => cell.style.display = 'table-cell');
      
      const dataCells = document.querySelectorAll(`#userR${i}, #compR${i}`);
      dataCells.forEach(cell => cell.style.display = 'table-cell');
    }
  }
};

// 점수판 초기화
const resetScoreboard = () => {
  for (let i = 1; i <= 10; i++) {
    const userCell = document.getElementById(`userR${i}`);
    const compCell = document.getElementById(`compR${i}`);
    if (userCell) {
      userCell.textContent = '-';
      userCell.classList.remove('current-round');
    }
    if (compCell) {
      compCell.textContent = '-';
      compCell.classList.remove('current-round');
    }
  }
  document.getElementById('userTotal').textContent = '0';
  document.getElementById('compTotal').textContent = '0';
  document.getElementById('roundDisplay').textContent = '1';
};

// 카드 렌더링
const renderCards = () => {
  const cardsArea = document.getElementById('cardsArea');
  cardsArea.innerHTML = '';
  
  userCards.forEach((card, index) => {
    const btn = document.createElement('button');
    btn.className = `${!isNaN(card) ? 'number-card' : 'operator-card'} ${usedCardIndices.includes(index) ? 'used' : ''}`;
    btn.textContent = card;
    btn.onclick = () => {
      if (!roundCompleted && !usedCardIndices.includes(index)) {
        userExpression.push(card);
        usedCardIndices.push(index);
        updateUserExpression();
        renderCards();
        
        // 모든 카드 사용 시 자동 제출 버튼 활성화
        if (usedCardIndices.length === 5) {
          document.querySelector('#actionButtons button').style.background = 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)';
        }
      }
    };
    cardsArea.appendChild(btn);
  });
};

const renderComputerCards = () => {
  const area = document.getElementById('computerCardsArea');
  area.innerHTML = '';
  computerCards.forEach(card => {
    const span = document.createElement('span');
    span.className = !isNaN(card) ? 'number-card' : 'operator-card';
    span.style.cursor = 'default';
    span.textContent = card;
    area.appendChild(span);
  });
};

const updateUserExpression = () => {
  const display = document.getElementById('userExpression');
  if (userExpression.length === 0) {
    display.textContent = '(카드를 순서대로 클릭하세요)';
  } else {
    display.textContent = userExpression.join(' ');
  }
};

// 컴퓨터 최적해 (최소값 찾기 - 모든 카드 사용)
const findBestExpression = (cards) => {
  const numbers = cards.filter(c => !isNaN(c));
  const operators = cards.filter(c => isNaN(c));
  
  let bestExpr = '';
  let bestValue = Infinity;

  // 모든 가능한 배치 시도 (숫자 3개, 연산자 2개 모두 사용)
  // 패턴: num op num op num
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 3; j++) {
      for (let k = 0; k < 3; k++) {
        if (i !== j && j !== k && i !== k) {
          for (let x = 0; x < 2; x++) {
            for (let y = 0; y < 2; y++) {
              if (x !== y) {
                try {
                  const expr = `${numbers[i]} ${operators[x]} ${numbers[j]} ${operators[y]} ${numbers[k]}`;
                  const rawVal = safeCalculate(expr);
                  if (!isNaN(rawVal)) {
                    const val = processResult(rawVal);
                    if (val < bestValue) {
                      bestValue = val;
                      bestExpr = expr;
                    }
                  }
                } catch {}
              }
            }
          }
        }
      }
    }
  }

  return { expr: bestExpr, value: bestValue, rawValue: safeCalculate(bestExpr) };
};

// 점수판 업데이트
const updateScoreboard = () => {
  // 하이라이트 제거
  for (let i = 1; i <= 10; i++) {
    const userCell = document.getElementById(`userR${i}`);
    const compCell = document.getElementById(`compR${i}`);
    if (userCell) userCell.classList.remove('current-round');
    if (compCell) compCell.classList.remove('current-round');
  }

  // 점수 업데이트
  for (let i = 0; i < userRoundScores.length; i++) {
    const userCell = document.getElementById(`userR${i + 1}`);
    if (userCell) userCell.textContent = userRoundScores[i];
  }
  for (let i = 0; i < computerRoundScores.length; i++) {
    const compCell = document.getElementById(`compR${i + 1}`);
    if (compCell) compCell.textContent = computerRoundScores[i];
  }
  
  document.getElementById('userTotal').textContent = userTotalScore;
  document.getElementById('compTotal').textContent = computerTotalScore;

  // 현재 라운드 하이라이트
  if (currentRound <= maxRounds) {
    const userCell = document.getElementById(`userR${currentRound}`);
    const compCell = document.getElementById(`compR${currentRound}`);
    if (userCell) userCell.classList.add('current-round');
    if (compCell) compCell.classList.add('current-round');
  }
};

// 라운드 결과 표시 (점수 정보 제거)
const showRoundResult = (userVal, userRaw, computerVal, computerRaw) => {
  let resultText = `라운드 ${currentRound} 완료!`;
  
  document.getElementById('roundResultText').textContent = resultText;
  document.getElementById('roundResultArea').classList.remove('hidden');
};

// 결과를 수식 입력창에 표시하는 함수
const showCalculationResult = (isUser, expression, rawValue) => {
  if (isUser) {
    const userExprDiv = document.getElementById('userExpression');
    userExprDiv.textContent = `${expression} = ${rawValue.toFixed(2)}`;
  } else {
    const computerExprDiv = document.getElementById('computerExpression');
    computerExprDiv.textContent = `${expression} = ${rawValue.toFixed(2)}`;
  }
};

// 게임 시작
const startGame = () => {
  currentRound = 1;
  maxRounds = getMaxRounds();
  userTotalScore = 0;
  computerTotalScore = 0;
  userRoundScores = [];
  computerRoundScores = [];
  userExpression = [];
  roundCompleted = false;
  usedCardIndices = [];
  gameEnded = false;

  setupScoreboard();
  resetScoreboard();
  userCards = generateUserCards();
  computerCards = generateComputerCards();
  
  updateScoreboard();
  renderCards();
  renderComputerCards();
  updateUserExpression();
  
  document.getElementById('computerExpression').textContent = '컴퓨터가 생각 중...';
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('roundResultArea').classList.add('hidden');
  document.getElementById('actionButtons').classList.remove('hidden');
};

const restartGame = () => startGame();

// 수식 제출
const submitExpression = () => {
  if (gameEnded || roundCompleted) return;
  
  if (usedCardIndices.length !== 5) {
    return alert('모든 카드(5장)를 사용해야 합니다!');
  }
  
  try {
    const exprString = userExpression.join(' ');
    const rawUserVal = safeCalculate(exprString);
    
    if (isNaN(rawUserVal)) {
      return alert('올바른 수식을 입력해주세요!');
    }
    
    const userVal = processResult(rawUserVal);
    
    const { expr: computerExpr, value: computerVal, rawValue: rawComputerVal } = findBestExpression(computerCards);

    // 수식 입력창에 결과 표시
    showCalculationResult(true, exprString, rawUserVal);
    showCalculationResult(false, computerExpr, rawComputerVal);

    userRoundScores.push(userVal);
    computerRoundScores.push(computerVal);
    userTotalScore += userVal;
    computerTotalScore += computerVal;
    
    updateScoreboard();
    roundCompleted = true;
    document.getElementById('actionButtons').classList.add('hidden');
    showRoundResult(userVal, rawUserVal, computerVal, rawComputerVal);

    if (currentRound >= maxRounds) {
      setTimeout(() => {
        gameEnded = true;
        let resultText = '';
        
        if (userTotalScore < computerTotalScore) {
          resultText = `🏆 축하합니다! 승리하셨습니다!<br>최종 점수: ${userTotalScore} vs ${computerTotalScore} (작을수록 승리!)`;
        } else if (computerTotalScore < userTotalScore) {
          resultText = `😔 아쉽게도 패배하셨습니다.<br>최종 점수: ${userTotalScore} vs ${computerTotalScore} (작을수록 승리!)`;
        } else {
          resultText = `🤝 무승부입니다!<br>최종 점수: ${userTotalScore} vs ${computerTotalScore}`;
        }
        
        document.getElementById('finalResult').innerHTML = resultText;
        document.getElementById('resultArea').classList.remove('hidden');
        document.getElementById('roundResultArea').classList.add('hidden');
      }, 2000);
    }
    
  } catch (error) {
    alert('올바른 수식을 입력해주세요!');
  }
};

// 다음 라운드
const nextRound = () => {
  if (gameEnded) return;
  
  currentRound++;
  document.getElementById('roundDisplay').textContent = currentRound;

  userCards = generateUserCards();
  computerCards = generateComputerCards();
  userExpression = [];
  usedCardIndices = [];
  roundCompleted = false;

  renderCards();
  renderComputerCards();
  updateUserExpression();
  document.getElementById('computerExpression').textContent = '컴퓨터가 생각 중...';
  
  updateScoreboard();
  document.getElementById('roundResultArea').classList.add('hidden');
  document.getElementById('actionButtons').classList.remove('hidden');
  
  // 제출 버튼 색상 초기화
  document.querySelector('#actionButtons button').style.background = '';
};

// 수식 초기화
const resetExpression = () => {
  if (!roundCompleted) {
    userExpression = [];
    usedCardIndices = [];
    renderCards();
    updateUserExpression();
    
    // 제출 버튼 색상 초기화
    document.querySelector('#actionButtons button').style.background = '';
  }
};

// 창 크기 변경 시 재설정
window.addEventListener('resize', () => {
  const newMaxRounds = getMaxRounds();
  if (newMaxRounds !== maxRounds && !gameEnded) {
    // 게임 진행 중 화면 크기가 변경되면 점수판만 재설정
    setupScoreboard();
  }
});

// 게임 시작
window.onload = () => startGame();
</script>

</body>
